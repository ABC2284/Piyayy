<!DOCTYPE html>
<html>
<head>
    <title>Test Firestore</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
</head>
<body>
    <h1>Test Firestore</h1>
    <button onclick="ajouter()">Ajouter un produit test</button>
    <div id="liste"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCvTJoU9sgsebLddIzR_ULMKOPtAME01Vo",
            authDomain: "piyayy-prod.firebaseapp.com",
            projectId: "piyayy-prod",
            storageBucket: "piyayy-prod.firebasestorage.app",
            messagingSenderId: "643997106002",
            appId: "1:643997106002:web:3f942ffa6f02b1c991c48b"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function charger() {
            const snap = await db.collection("produits").get();
            const div = document.getElementById("liste");
            div.innerHTML = "";
            snap.forEach(doc => {
                div.innerHTML += `<p>${doc.data().nom} - ${doc.data().prix}</p>`;
            });
        }

        async function ajouter() {
            await db.collection("produits").add({ nom: "Test", prix: "10$", categorie: "Test" });
            charger();
        }

        charger();
    </script>
</body>
</html>
