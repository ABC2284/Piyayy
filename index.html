<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIYAYY - Chargement</title>

  <!-- ===== PWA & ICÔNES ===== -->
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Piyayy">
    <meta name="theme-color" content="#1e3c72">

    <!-- Icônes pour PC -->
    <link rel="icon" type="image/png" sizes="16x16" href="icon-piyayy.png">
    <link rel="icon" type="image/png" sizes="32x32" href="icon-piyayy.png">
    <link rel="icon" type="image/png" sizes="96x96" href="icon-piyayy.png">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-piyayy.png">

    <!-- Icônes pour iPhone / iPad -->
    <link rel="apple-touch-icon" sizes="57x57" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="60x60" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="72x72" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="76x76" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="114x114" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="120x120" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="144x144" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="152x152" href="icon-piyayy.png">
    <link rel="apple-touch-icon" sizes="180x180" href="icon-piyayy.png">

    <!-- Image de démarrage pour iPhone -->
    <link rel="apple-touch-startup-image" href="fond-splash.jpg">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Image de fond avec effet caméra (zoom fluide) */
        .bg-zoom {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('fond-splash.jpg'); /* ← Remplace par ton image */
            background-size: cover;
            background-position: center;
            animation: cameraZoom 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes cameraZoom {
            0% {
                transform: scale(1);
            }
            100% {
                transform: scale(1.08);
            }
        }

        /* Assombrissement pour que le texte soit lisible */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        /* Contenu principal */
        .splash-container {
            text-align: center;
            z-index: 2;
            animation: fadeInUp 0.8s ease;
            padding: 1rem;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo-icon {
            font-size: 5rem;
            display: inline-block;
            animation: bounceLogo 1.2s infinite alternate ease-in-out;
            filter: drop-shadow(0 0 15px gold);
        }

        @keyframes bounceLogo {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.1) translateY(-5px); }
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD966, #FFF5CC, #FFD966);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin: 0.5rem 0;
            letter-spacing: 2px;
        }

        .sub {
            color: rgba(255,255,240,0.9);
            font-size: 1rem;
            font-weight: 500;
            margin-bottom: 2rem;
            text-shadow: 0 0 5px black;
        }

        .progress-wrapper {
            width: 220px;
            margin: 0 auto;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, gold, #ffaa00, gold);
            border-radius: 10px;
            animation: loadProgress 2.5s ease-out forwards;
            box-shadow: 0 0 6px gold;
        }

        @keyframes loadProgress {
            0% { width: 0%; }
            100% { width: 100%; }
        }

        .loading-text {
            color: rgba(255,255,200,0.8);
            font-size: 0.7rem;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        .version {
            position: fixed;
            bottom: 15px;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.5);
            font-size: 0.7rem;
            z-index: 2;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2rem;
            }
            .logo-icon {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Image avec effet caméra -->
    <div class="bg-zoom"></div>
    <div class="overlay"></div>

    <div class="splash-container">
        <div class="logo-icon">🛍️</div>
        <h1>PIYAYY</h1>
        <div class="sub">Tout ou bezwen, an yon sel klike</div>

        <div class="progress-wrapper">
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
            <div class="loading-text">CHARGEMENT EN COURS...</div>
        </div>
    </div>

    <div class="version">
        PIYAYY v2.0 | Maïssade • Hinche
    </div>

    <script>
        function redirectToApp() {
            window.location.href = "app.html";
        }

        if (document.readyState === "complete") {
            setTimeout(redirectToApp, 3000);
        } else {
            window.addEventListener("load", () => {
                setTimeout(redirectToApp, 3000);
            });
        }

        setTimeout(() => {
            window.location.href = "app.html";
        }, 5000);
    </script>
</body>
</html>
