<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PIYAYY - Admin</title>

    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Piyayy">
    <meta name="theme-color" content="#1e3c72">
    <link rel="apple-touch-icon" href="icon-piyayy.png">

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>

    <style>
        body {
            font-family: system-ui;
            background: #f0f2f5;
            padding: 1rem;
            max-width: 800px;
            margin: auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        input, textarea, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 16px;
            border: 1px solid #ccc;
        }
        button {
            background: #1e3c72;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            margin-top: 10px;
        }
        button.danger {
            background: #c0392b;
        }
        button.secondary {
            background: #27ae60;
        }
        .upload-area {
            border: 2px dashed #ccc;
            border-radius: 16px;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            margin: 10px 0;
        }
        .preview-img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 12px;
            margin-top: 10px;
        }
        .produit-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f9f9f9;
            padding: 0.8rem;
            border-radius: 20px;
            margin-bottom: 0.5rem;
            flex-wrap: wrap;
        }
        .produit-actions button {
            margin-left: 5px;
            padding: 5px 10px;
            font-size: 0.8rem;
        }
        .buttons-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <h1>🏋️‍♂️🏋️‍♀️ Admin PIYAYY</h1>

    <!-- Sauvegarde / Restauration locale -->
    <div class="card">
        <h2>💾 Sauvegarde / Restauration locale</h2>
        <div class="buttons-group">
            <button id="exporterBtn">📁 Sauvegarder (JSON)</button>
            <button id="importerBtn" class="secondary">📂 Restaurer depuis fichier</button>
            <input type="file" id="fichierImport" accept=".json" style="display: none;">
        </div>
        <p style="font-size: 0.8rem; margin-top: 10px;">💡 Sauvegardez vos produits dans un fichier (utile pour migration ou backup).</p>
    </div>

    <!-- Ajouter un produit -->
    <div class="card">
        <h2>➕ Ajouter un produit</h2>
        <input type="text" id="nom" placeholder="Nom du produit">
        <input type="text" id="prix" placeholder="Prix (ex: 35$)">
        <select id="categorie">
            <option value="Protéine">💪 Protéine</option>
            <option value="Créatine">⚡ Créatine</option>
            <option value="Vitamine">💊 Vitamine</option>
            <option value="Pre-Workout">📦 Pre-Workout</option>
            <option value="BCAA">📦 BCAA</option>
            <option value="SHACKER">📦 SHACKER</option>
        </select>

        <div class="upload-area" id="uploadArea">
            📸 Cliquez pour ajouter une image
            <input type="file" id="imageFile" accept="image/*" style="display: none;">
            <div id="imagePreview" class="preview-img"></div>
        </div>

        <textarea id="description" rows="2" placeholder="Description"></textarea>
        <button id="ajouterBtn">➕ Ajouter</button>
    </div>

    <!-- Liste des produits avec modification et suppression -->
    <div class="card">
        <h2>📋 Gestion des produits</h2>
        <div id="listeProduitsAdmin"></div>
    </div>

    <script>
        // Configuration Firebase (ta vraie configuration)
        const firebaseConfig = {
            apiKey: "AIzaSyCvTJoU9sgsebLddIzR_ULMKOPtAME01Vo",
            authDomain: "piyayy-prod.firebaseapp.com",
            projectId: "piyayy-prod",
            storageBucket: "piyayy-prod.firebasestorage.app",
            messagingSenderId: "643997106002",
            appId: "1:643997106002:web:3f942ffa6f02b1c991c48b",
            measurementId: "G-NVY4BTT000"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let imageData = null;

        // Upload image
        document.getElementById("uploadArea").addEventListener("click", () => {
            document.getElementById("imageFile").click();
        });
        document.getElementById("imageFile").addEventListener("change", (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    imageData = ev.target.result;
                    document.getElementById("imagePreview").innerHTML = `<img src="${imageData}" class="preview-img">`;
                };
                reader.readAsDataURL(file);
            }
        });

        // ==================== FIRESTORE CRUD ====================
        async function ajouterProduitFirestore(produit) {
            try {
                const docRef = await db.collection("produits").add(produit);
                produit.id = docRef.id;
                return true;
            } catch (error) {
                console.error("Erreur Firestore (ajout):", error);
                return false;
            }
        }

        async function supprimerProduitFirestore(id) {
            try {
                await db.collection("produits").doc(id).delete();
                return true;
            } catch (error) {
                console.error("Erreur Firestore (suppression):", error);
                return false;
            }
        }

        async function modifierProduitFirestore(id, nouvellesDonnees) {
            try {
                await db.collection("produits").doc(id).update(nouvellesDonnees);
                return true;
            } catch (error) {
                console.error("Erreur Firestore (modification):", error);
                return false;
            }
        }

        // Afficher la liste admin depuis Firestore
        async function afficherListeAdmin() {
            const container = document.getElementById("listeProduitsAdmin");
            try {
                const snapshot = await db.collection("produits").orderBy("nom").get();
                if (snapshot.empty) {
                    container.innerHTML = "<p>Aucun produit</p>";
                    return;
                }
                let html = "";
                snapshot.forEach(doc => {
                    const p = doc.data();
                    html += `
                        <div class="produit-item" data-id="${doc.id}">
                            <div>
                                <strong>${escapeHtml(p.nom)}</strong> - ${escapeHtml(p.prix)}<br>
                                <small>${escapeHtml(p.categorie)}</small>
                            </div>
                            <div class="produit-actions">
                                <button class="modifier-btn" data-id="${doc.id}">✏️ Modifier</button>
                                <button class="supprimer-btn" data-id="${doc.id}">🗑️ Supprimer</button>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;

                // Événements Supprimer
                document.querySelectorAll(".supprimer-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        e.stopPropagation();
                        const id = btn.getAttribute("data-id");
                        if (confirm("Supprimer ce produit ?")) {
                            const ok = await supprimerProduitFirestore(id);
                            if (ok) {
                                await afficherListeAdmin();
                                if (typeof appliquerFiltres === "function") appliquerFiltres();
                            } else {
                                alert("Erreur lors de la suppression");
                            }
                        }
                    });
                });

                // Événements Modifier
                document.querySelectorAll(".modifier-btn").forEach(btn => {
                    btn.addEventListener("click", async (e) => {
                        e.stopPropagation();
                        const id = btn.getAttribute("data-id");
                        await modifierProduitUI(id);
                    });
                });
            } catch (error) {
                console.error("Erreur affichage:", error);
                container.innerHTML = "<p>Erreur de chargement</p>";
            }
        }

        // Modifier un produit (UI avec prompt, puis mise à jour Firestore)
        async function modifierProduitUI(id) {
            const doc = await db.collection("produits").doc(id).get();
            if (!doc.exists) return;
            const produit = doc.data();

            const nouveauNom = prompt("Nouveau nom :", produit.nom);
            if (nouveauNom !== null && nouveauNom.trim() !== "") produit.nom = nouveauNom.trim();

            const nouveauPrix = prompt("Nouveau prix :", produit.prix);
            if (nouveauPrix !== null && nouveauPrix.trim() !== "") produit.prix = nouveauPrix.trim();

            const nouvelleCategorie = prompt("Nouvelle catégorie (Protéine, Créatine, Vitamine, Pre-Workout, BCAA, SHACKER) :", produit.categorie);
            if (nouvelleCategorie !== null && nouvelleCategorie.trim() !== "") produit.categorie = nouvelleCategorie.trim();

            const nouvelleDescription = prompt("Nouvelle description :", produit.description || "");
            if (nouvelleDescription !== null) produit.description = nouvelleDescription;

            let nouvelleImage = null;
            if (confirm("Changer l'image ?")) {
                const input = document.createElement("input");
                input.type = "file";
                input.accept = "image/*";
                nouvelleImage = await new Promise((resolve) => {
                    input.onchange = async (e) => {
                        const file = e.target.files[0];
                        if (file) {
                            const reader = new FileReader();
                            reader.onload = (ev) => resolve(ev.target.result);
                            reader.readAsDataURL(file);
                        } else {
                            resolve(null);
                        }
                    };
                    input.click();
                });
                if (nouvelleImage) produit.image = nouvelleImage;
            }

            const ok = await modifierProduitFirestore(id, {
                nom: produit.nom,
                prix: produit.prix,
                categorie: produit.categorie,
                description: produit.description,
                image: produit.image || null
            });
            if (ok) {
                await afficherListeAdmin();
                if (typeof appliquerFiltres === "function") appliquerFiltres();
                alert("✅ Produit modifié !");
            } else {
                alert("❌ Erreur lors de la modification");
            }
        }

        // Ajouter produit (depuis le formulaire)
        document.getElementById("ajouterBtn").addEventListener("click", async () => {
            const nom = document.getElementById("nom").value.trim();
            const prix = document.getElementById("prix").value.trim();
            const categorie = document.getElementById("categorie").value;
            const description = document.getElementById("description").value.trim();
            if (!nom || !prix) return alert("Nom et prix requis");

            const nouveauProduit = {
                nom,
                prix,
                categorie,
                description,
                image: imageData || null,
                date: new Date().toISOString()
            };
            const ok = await ajouterProduitFirestore(nouveauProduit);
            if (ok) {
                await afficherListeAdmin();
                document.getElementById("nom").value = "";
                document.getElementById("prix").value = "";
                document.getElementById("description").value = "";
                document.getElementById("imagePreview").innerHTML = "";
                imageData = null;
                alert("✅ Produit ajouté !");
            } else {
                alert("❌ Erreur lors de l'ajout");
            }
        });

        // ==================== SAUVEGARDE / RESTAURATION LOCALE (JSON) ====================
        async function exporterProduits() {
            const snapshot = await db.collection("produits").orderBy("nom").get();
            const produits = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            const data = JSON.stringify(produits, null, 2);
            const blob = new Blob([data], {type: "application/json"});
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `piyayy_produits_${new Date().toISOString().slice(0,19)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert("✅ Produits sauvegardés !");
        }

        async function importerProduits(fichier) {
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const produits = JSON.parse(ev.target.result);
                    if (!Array.isArray(produits)) throw new Error();
                    const snapshot = await db.collection("produits").get();
                    const batch = db.batch();
                    snapshot.forEach(doc => batch.delete(doc.ref));
                    await batch.commit();
                    for (const prod of produits) {
                        const { id, ...data } = prod;
                        await db.collection("produits").add(data);
                    }
                    await afficherListeAdmin();
                    if (typeof appliquerFiltres === "function") appliquerFiltres();
                    alert("✅ Produits restaurés avec succès !");
                } catch (err) {
                    alert("❌ Fichier invalide");
                }
            };
            reader.readAsText(fichier);
        }

        document.getElementById("exporterBtn").addEventListener("click", exporterProduits);
        document.getElementById("importerBtn").addEventListener("click", () => {
            document.getElementById("fichierImport").click();
        });
        document.getElementById("fichierImport").addEventListener("change", (e) => {
            if (e.target.files.length) importerProduits(e.target.files[0]);
        });

        // Helper
        function escapeHtml(str) {
            if (!str) return "";
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Initialisation
        afficherListeAdmin();
    </script>
</body>
</html>
